<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>4-A SOHBET Odası</title>
  <style>
    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h2 {
      font-size: 35px;
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
    }
    #messages, #portfolio {
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 15px;
      margin: 20px auto;
      width: 80%;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 0 10px #00ffcc;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #ff00cc;
      color: #fff;
      box-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc;
      cursor: pointer;
    }
    button:hover {
      transform: scale(1.1);
    }
    a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h2>🚀 4-A SOHBET Odası 🚀</h2>

  <div id="messages"></div>
  <input type="text" id="messageInput" placeholder="Mesaj yaz...">
  <button onclick="sendMessage()">Gönder</button>

  <h3>📂 Proje Yükle</h3>
  <input type="file" id="fileInput">
  <button onclick="uploadProject()">Yükle</button>

  <h3>🌟 Portfolyo</h3>
  <div id="portfolio"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCMrb6W9619K83NLFCmymYCTJ7IGe6ajA",
      authDomain: "asohbet-a2894.firebaseapp.com",
      projectId: "asohbet-a2894",
      storageBucket: "asohbet-a2894.appspot.com",
      messagingSenderId: "587394355293",
      appId: "1:587394355293:web:ce355543a390a000e53db4",
      measurementId: "G-4B1JWKNB1S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    const messagesRef = ref(db, "messages");
    const portfolioRef = ref(db, "portfolio");

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value;
      if (text.trim() !== "") {
        push(messagesRef, { text: text });
        input.value = "";
      }
    }

    onChildAdded(messagesRef, snapshot => {
      const msg = snapshot.val();
      const div = document.createElement("div");
      div.textContent = msg.text;
      document.getElementById("messages").appendChild(div);
    });

    function uploadProject() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return;
      const storageRef = sRef(storage, "projects/" + file.name);
      uploadBytes(storageRef, file).then(() => {
        getDownloadURL(storageRef).then(url => {
          push(portfolioRef, { name: file.name, url: url });
        });
      });
    }

    onChildAdded(portfolioRef, snapshot => {
      const proj = snapshot.val();
      const div = document.createElement("div");
      div.innerHTML = `<a href="${proj.url}" target="_blank">${proj.name}</a>`;
      document.getElementById("portfolio").appendChild(div);
    });
  </script>
</body>
</html>
