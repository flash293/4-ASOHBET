<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>4-A SOHBET</title>
  <style>
    body { font-family: Arial; background: #111; color: #eee; margin: 20px; }
    h2 { color: #0ff; }
    #chatBox {
      border: 1px solid #444;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
      background: #222;
    }
    input {
      padding: 5px;
      width: 70%;
      border: 1px solid #555;
      background: #333;
      color: #eee;
    }
    button {
      padding: 5px 10px;
      background: #0ff;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #0cc;
    }
  </style>
</head>
<body>
  <h2>ASOHBET Odası</h2>
  <div id="chatBox"></div>
  <form id="chatForm">
    <input type="text" id="message" placeholder="Mesaj yaz...">
    <button type="submit">Gönder</button>
  </form>

  <script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("message");
    const chatBox = document.getElementById("chatBox");

    form.addEventListener("submit", function(e) {
      e.preventDefault(); // sayfanın yenilenmesini engeller
      const msg = input.value.trim();
      if(msg !== "") {
        const p = document.createElement("p");
        p.textContent = msg;
        chatBox.appendChild(p);
        chatBox.scrollTop = chatBox.scrollHeight; // otomatik aşağı kaydır
        input.value = "";
      }
    });
  </script>
</body>
</html>
